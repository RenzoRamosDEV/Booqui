spring.application.name=event
server.port=8081

# DB_URL_EVENT=jdbc:mysql://localhost:3306/event;DB_USERNAME_EVENT=root;DB_PASSWORD_EVENT=admin

# MySQL Configuration
spring.datasource.url=${DB_URL_EVENT:jdbc:mysql://localhost:3306/event}
spring.datasource.username=${DB_USERNAME_EVENT:root}
spring.datasource.password=${DB_PASSWORD_EVENT:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true