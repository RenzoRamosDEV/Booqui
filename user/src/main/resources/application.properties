spring.application.name=user
server.port=8080

# DB_URL_USER=jdbc:mysql://localhost:3306/user;DB_USERNAME_USER=root;DB_PASSWORD_USER=admin

# Database Configuration
spring.datasource.url=${DB_URL_USER:jdbc:mysql://localhost:3306/user}
spring.datasource.username=${DB_USERNAME_USER:root}
spring.datasource.password=${DB_PASSWORD_USER:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Springdoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

